_BASE: ../OTAM_base.yaml
TASK_TYPE: few_shot_action
TRAIN:
  ENABLE: true
  USE_CLASSIFICATION: false
  USE_CLASSIFICATION_VALUE: 3.0
  DATASET: Ssv2_few_shot
  META_BATCH: true  # meta or not
  NUM_SAMPLES: 1000000
  WAY: 5
  SHOT: 5
  QUERY_PER_CLASS: 2
  QUERY_PER_CLASS_TEST: 1
  NUM_TRAIN_TASKS: 30000
  NUM_TEST_TASKS: 10000
  VAL_FRE_ITER: 1000
  BATCH_SIZE: 2 # Same with NUM_GPUS
  BATCH_SIZE_PER_TASK: 2
  CLASS_NAME: ["[something] is held above [something] and tilted then the contents flow down into [something]", "a stack of [something] stands upright then is poked and the stack remains standing without collapsing", "a poking motion is directed toward [something] then stops before contact so [something] is not actually poked", "one end of [something] is lifted upward then held in the raised position without being let go", "one part of [something] is at a certain position then moved while the rest of [something] stays in place", "two objects start near each other then both are moved apart until there is a gap between them", "[something] is in front of [something] then moved away so [something] behind becomes visible", "[something] is aligned with the opening of [something] then pushed in until fully connected", "[something] with contents inside is tipped over to one side then the contents fall out", "multiple [something] are placed one by one on top of each other until a stack is formed", "[something] is set on a slanted surface then stays in place without sliding down", "[something] is pushed along the surface then continues to the edge and falls off", "[something] is tossed upward into the air then caught before it falls to the ground", "[something] is placed standing upright on the table then loses balance and falls over onto its side", "[something] is picked up then held in position next to [something]", "[something] is moved toward the space under [something] in a placing gesture then withdrawn without being placed", "[something] is touched very lightly then stays almost completely still or barely shifts", "the camera is far from [something] then moves closer until [something] takes up more of the frame", "[something] is poked from one side then rotates and spins in place", "[something] is on the table surface then pushed toward the edge until it slides off and drops down", "a container of [something] is tilted or knocked then the contents spill out beside [something]", "[something] is held and a twisting motion is applied then [something] does not rotate", "both ends of [something] are pulled apart with force then [something] splits into two separate pieces", "one end of [something] is lifted upward then released so it falls back down", "[something] with [something] on top is tilted to one side then held at that angle while [something] stays on", "[something] is placed onto the surface of [something] then spread across it to cover the area", "[part] of [something] is touched then [something] remains completely still without moving", "the camera is facing [something] then turned to the left so the view shifts leftward", "[something] is in a resting position then given a gentle push so it shifts only a small amount", "[something] is covered with [something] on top then the cover is lifted away to reveal [something]", "[something] is pushed or slid along the surface then stops before reaching the edge", "[something] is picked up then moved and placed in the space behind [something]", "[something] and [something] are separate then [something] is connected or fixed onto [something] so they join together", "[something] is beside [something] then dragged over and onto [something] so it rests on top", "[something] is pressed into [something] and pushed down further until it is buried inside", "multiple [something] are placed one by one then each is set down onto [something]", "[something] is placed or given a push on a flat surface then rolls along the surface", "[something] is bent under applied force then deforms further until it snaps and breaks apart", "[something] is moved to a position at the back of [something] then held there so it is visible behind", "[something] is in a closed state then a hand moves toward it as if opening but it stays closed", "[something] is moved above [something] in a placing motion then pulled back without being set down", "[something] is shown close in the frame then the camera moves back so [something] appears smaller and farther away", "[something] is on the surface of [something] then wiped or rubbed off so it is removed from the surface", "a hand is moved above [something] in a spreading gesture then nothing is actually applied", "[something] is picked up then held in position above [something]", "[something] is on the surface of [something] then a wiping motion is applied but [something] remains on the surface", "[something] is moved toward a surface in a placing motion then pulled away without being set down", "two objects are moved toward each other then they meet and collide", "[something] is held and a flipping motion is made then [something] is not fully turned upside down", "[something] is picked up then held facing toward the camera for display", "[something] is held above [something] then released so it drops and lands on top of [something]", "[something] is pushed toward the edge of a surface then stops just before falling off", "multiple [something] are collected then stacked or piled on top of each other", "several similar objects are on the table then one is picked up and taken away", "[something] is picked up then placed down in the space directly in front of [something]", "[something] is upright or held above the table then placed down lying on its side", "the surface with [something] on top is tilted upward then [something] begins to slide down along the surface", "[something] is at rest then poked so it shifts slightly from its original position", "[something] is brought to the opening of [something] then placed inside", "[something] is on the right side then pulled so it slides from right to left", "[something] is held up or opened then shown to have nothing inside", "a container of [something] is tilted or knocked over then the contents spill out behind [something]", "[something] is placed at the top of a slanted surface then rolls down along the slope", "[something] is picked up then moved and held in position behind [something]"]
  CHECKPOINT_FILE_PATH: ""
  EVAL_PERIOD: 2
  NUM_FOLDS: 1
  SEMANTIC_COMBINE: true
  TEXT_COFF: 0.25

  SEMANTIC_LOSS_WEIGHT: 1
  SEMANTIC_TEMPERATURE: 0.1
  SEMANTIC_TRANSPOSE: false

  USE_QUERY_EMBED_TRAIN: false
  USE_QUERY_EMBED_EVAL: false

  USE_MID_LAYER_TRAIN: false
  USE_MID_LAYER_EVAL: false
  USE_MID_LAYER2: false
  USE_MID_LAYER2_SEMANTIC_TRAIN: false
  USE_MID_LAYER2_SEMANTIC_EVAL: false

  TRANSFORMER_DEPTH: 1
  FREEZE_BACKBONE: false
  USE_AMP: true

AUGMENTATION:
  COLOR_AUG: false
  NO_RANDOM_ERASE: true
  

TEST:
  ENABLE: false
  DATASET: Ssv2_few_shot
  BATCH_SIZE: 2 # Same with NUM_GPUS
  CLASS_NAME: ["[something] wet is gripped at both ends then twisted and wrung repeatedly until water drips out", "a pointed object is pressed against [something soft] then pushed through to make a hole", "[somewhere] is approached as if [something] is being taken from it then the motion stops and nothing is removed", "[something] is held or lying flat then placed standing upright on the table", "a pointed object is pressed against [some substance] then pushed through to create a hole", "[something] is placed or pushed on a flat surface then rolls along the surface", "a stack of [something] stands upright then is poked and the stack falls apart and collapses", "[something] is held in place then rotated around its axis so it twists", "[something] is released or dropped from a height then drifts slowly and gently downward through the air", "[something] is placed at the edge of [something] without enough support then tips over and falls off", "[something] is on top of [something] then pushed sideways until it goes over the edge and falls off", "[something] is held above [something] then released so it drops down into [something]", "[something] is pushed along a slanted surface upward then slows to a stop and rolls back down", "[something] is placed in contact with [something] then moved forward so [something] is pushed along by [something]", "[something] is in a closed state then pulled or pushed until it is fully open", "[something] is held above a surface then lowered and placed down onto it", "[something] is inside [something] then reached in and pulled out completely", "[something] starts spinning then slows down and comes to a complete stop quickly", "[something] is in a folded state then unfolded and opened out to its full extent", "[something] is far from the camera then moved toward the camera so it appears larger and closer", "[something] is picked up then placed down beside [something]", "[something] is on a surface or inside [something] then scooped up and lifted by [something]", "[something] is gripped from both sides then pressed inward so it is squeezed and compressed", "[something] is pushed toward the opening of [something] then fails to enter because it does not fit"]
  TEST_SET: val
  NUM_ENSEMBLE_VIEWS: 1
  SPATIAL_CROPS: cctltr
  AUTOMATIC_MULTI_SCALE_TEST: false
  UPLOAD_CLASSIFIER_RESULTS: true

DATA:
  DATA_ROOT_DIR: ./ssv2/output1/ssv2_240p_mp4/
  ANNO_DIR: ./configs/projects/CLIPFSAR/ssv2_small/
  NUM_INPUT_FRAMES: 8
  SAMPLING_RATE: 50
  SAMPLING_UNIFORM: false
  TRAIN_JITTER_SCALES: [256, 256]
  TRAIN_CROP_SIZE: 224 # 84  # 224
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  TEST_CROP_SIZE: 224
  TEST_SCALE: 256
  TEST_CENTER_CROP: true
  CLIP_INTERVAL: 8
  FPS: 12
  TARGET_FPS: 12

LOG_PERIOD: 50
SOLVER:
  BASE_LR: 0.00005 
  LR_POLICY: steps_with_relative_lrs
  STEPS_ITER: 2000
  STEPS: [0, 4, 6]
  LRS: [1, 0.1, 0.01]
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 5e-5
  WARMUP_EPOCHS: 1
  WARMUP_START_LR: 0.00002
  OPTIM_METHOD: adam
  DAMPENING: 0.0
  NESTEROV: true
# add bn, use same lr settings as server

VIDEO:
  HEAD:
    NAME: CNN_SEMANTIC_ALIGNMENT_FEW_SHOT
    ACTIVATION: softmax
    DROPOUT_RATE: 0.0
    NUM_CLASSES: 5  # Few-shot任务中的类别数（WAY）
    BACKBONE_NAME: ViT-B/16

  BACKBONE:
    META_ARCH: Identity

DATA_LOADER:
  NUM_WORKERS: 24
  PIN_MEMORY: true
  ENABLE_MULTI_THREAD_DECODE: true

NUM_GPUS: 2
OUTPUT_DIR: output_small/CLIPFSAR_SSv2_Small_1shot


