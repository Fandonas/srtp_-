_BASE: ../OTAM_base.yaml
TASK_TYPE: few_shot_action
RANDOM_SEED: 18
TRAIN:
  ENABLE: true
  USE_CLASSIFICATION: false
  USE_CLASSIFICATION_VALUE: 1.5
  DATASET: Ssv2_few_shot
  DATASET_FEW: Kinetics_few_shot
  META_BATCH: true  # meta or not
  NUM_SAMPLES: 1000000
  WAY: 5
  SHOT: 5
  QUERY_PER_CLASS: 2
  QUERY_PER_CLASS_TEST: 1
  NUM_TRAIN_TASKS: 7000
  NUM_TEST_TASKS: 10000
  VAL_FRE_ITER: 100
  BATCH_SIZE: 4  # Same with NUM_GPUS
  TEXT_COFF: 0.5

  # 语义对齐专属配置
  SEMANTIC_LOSS_WEIGHT: 1
  SEMANTIC_TEMPERATURE: 0.1
  SEMANTIC_TRANSPOSE: false
  SEMANTIC_COMBINE: true
  USE_QUERY_EMBED_TRAIN: false #，不启用   # 默认 true，训练时使用可学习的 query embedding
  USE_QUERY_EMBED_EVAL: false    # 设置为 true，评估时也使用 query embedding

  # Mid Layer 控制参数：
  # USE_MID_LAYER_TRAIN: 训练模式是否对 context_support 应用 mid_layer 变换
  # USE_MID_LAYER_EVAL: 评估模式是否对 context_support 应用 mid_layer 变换
  #   - true:  对文本特征应用 mid_layer 线性变换（增强表达能力）
  #   - false: 直接使用原始文本特征（保持 CLIP 原始语义）
  USE_MID_LAYER_TRAIN: false     # 默认 true，训练时使用 mid_layer
  USE_MID_LAYER_EVAL: false      # 设置为 true，评估时也使用 mid_layer
  # USE_MID_LAYER2: 是否启用 mid_layer2 并行处理
  #   - true:  context_support 并行进入 mid_layer 和 mid_layer2，生成 context_support2
  # USE_MID_LAYER2_SEMANTIC_TRAIN/EVAL: 是否用 context_support2 强化 support_features_for_semantic
  #   强化方式与 OTAM 一致：context2(cat[support_raw, context_support2])
  #   注意：USE_MID_LAYER2 必须为 true，这两个参数才生效
  USE_MID_LAYER2: false                   # 默认 false，不启用 mid_layer2
  USE_MID_LAYER2_SEMANTIC_TRAIN: false    # 默认 false，训练时不强化语义特征
  USE_MID_LAYER2_SEMANTIC_EVAL: false     # 默认 false，评估时不强化语义特征
  USE_AMP: false

  TRANSFORMER_DEPTH: 1
  FREEZE_BACKBONE: false
  CLASS_NAME: ["a person raises both arms and positions the hands then strikes downward repeatedly in a rhythmic motion", "two people grip hands and lock arms then push and pull to force the opponent down", "a person positions the mouth and takes a breath then produces rhythmic vocal sounds", "a person sits on a bicycle and grips the handlebars then pedals forward through snow", "a person gathers molten material on a tube then blows air through it while rotating to shape", "a person leans toward flames then exhales forcefully to extinguish them", "a person holds a ball and approaches the lane then swings the arm back then releases the ball forward", "a person crouches and positions the body low then spins on the back or head while supporting with the arms", "a person stands on a high platform then leaps off the edge and falls freely", "a person positions the hands to receive an incoming object then closes the hands to catch it", "a group of performers takes formation then jumps kicks and moves in synchronized patterns", "a person holds a cleaning tool and positions it on the floor then pushes and pulls it across the surface", "a person holds multiple objects in the hands then rolls and balances them across the palms and fingers in continuous contact", "a person prepares food and places it in a container then cooks it over heat while stirring", "dancers form a line and position their feet then step slide and turn in synchronized patterns", "a person wraps a section of hair around a heated tool then holds it briefly and releases to form a curl", "a person grips a loaded weight with both hands and positions the feet then lifts the weight from the ground to standing", "a person sits and holds an applicator then carefully applies color to the nails", "a player holds a ball and bounces it on the ground then moves forward while continuously bouncing the ball", "a person sits on a vehicle and grips the controls then operates them to drive forward", "a player holds a ball and drops it toward the ground then swings the leg forward to kick it", "a person applies coloring substance to sections of hair then waits for the color to set", "a person holds food with both hands and brings it to the mouth then takes a bite and chews", "a person holds food in the hand then scatters or offers it to birds", "a person walks onto a stage then accepts or presents an award with a handshake", "a person tosses an object onto marked squares on the ground then hops through the pattern while avoiding it", "a person sits on a watercraft and grips the controls then accelerates across the water surface", "a person stands at the edge of water and bends the knees then leaps forward and enters the water", "a person reacts to something amusing by opening the mouth then produces repeated vocal sounds while the body shakes", "a person rolls snow into large shapes and stacks them then adds accessories to form a figure", "a person places both hands on another person's back then presses and rubs the muscles", "a person pushes a cutting tool forward across the surface then moves it back and forth to cut evenly", "a person grips a container closure with the hand then twists or pulls upward to remove it", "a musician holds an instrument with both hands and positions the fingers then pushes and pulls while pressing to produce notes", "a player holds a racket and positions near the net then swings the racket to hit the object over the net", "a player dribbles the ball down the court then passes or shoots toward the basket", "a musician places the lips against the end of an instrument then blows air to produce a continuous sound", "a player skates across the ice while holding a stick then passes or shoots the object toward the goal", "a person sits at an instrument and positions both hands over the keys then presses the keys with the fingers to play notes", "a musician holds a stringed instrument and positions the fingers on the neck then strums or plucks the strings to produce sound", "a person holds two tools above an instrument then strikes the bars in sequence to produce melodic notes", "a presenter stands in front of a display then gestures and speaks to explain information", "a person stands in front of a target and raises the fists then throws repeated punches into it", "a person grips the handle of a cart then pushes it forward", "a person holds reading material open with both hands then moves the eyes across the text", "a person mounts a single-wheeled cycle and grips the seat then pedals forward while balancing", "a person holds the head upright then rotates it from side to side repeatedly", "a person inserts a writing tool into a sharpening device then rotates it to sharpen the tip", "a person applies substance to the scalp then uses a tool to remove hair from the head", "an athlete holds a heavy object at the shoulder and crouches then spins forward and pushes the object outward with force", "a person holds a deck of cards in both hands then bends and releases them to interleave the cards together", "a person steps onto a suspended line between two points then walks forward while balancing with arms extended", "a person stands on a sled and commands animals then the animals pull the sled forward across snow", "a person positions both feet on a board at the top of a slope then rides downward while shifting weight to turn", "a person crouches and tucks the head toward the chest then rolls forward in a complete rotation", "a person stands upright with feet apart then bends the knees to lower the body down and rises back up", "a performer dives or is passed over the heads of a crowd then is carried forward by the hands of others", "a performer grips a suspended bar in the air then swings and releases to catch another bar", "a person sits at a workstation and positions the hands over input devices then operates them to interact with the system", "a person holds an item under water then scrubs it with a tool and rinses", "a person places both hands under water then rubs them together with soap and rinses", "a person holds a rope and positions on equipment then is pulled forward across the water surface while balancing", "a person applies substance to the skin then presses material onto it and pulls quickly to remove hair", "a person holds strips of material then interlaces them over and under in a pattern to form a container shape"]
  BATCH_SIZE_PER_TASK: 4
  CHECKPOINT_FILE_PATH: ""
  EVAL_PERIOD: 2
  NUM_FOLDS: 1

AUGMENTATION:
  COLOR_AUG: false
  NO_RANDOM_ERASE: true
  SUPPORT_QUERY_DIFF: true

TEST:
  ENABLE: false
  DATASET: Ssv2_few_shot
  BATCH_SIZE: 4  # Same with NUM_GPUS
  TEST_SET: val
  NUM_ENSEMBLE_VIEWS: 1
  SPATIAL_CROPS: cctltr
  CLASS_NAME: ["a person aims a device at a surface then releases pressurized material to impact it", "a person positions in a location and prepares then performs actions to attract attention", "a person holds an object steady and positions a blade then moves the blade through it repeatedly to cut", "a person positions the body upright and raises onto the toes then moves through balanced poses", "a person positions the feet apart and bends the knees then kicks and steps in quick succession", "a person positions the body and raises the arms then moves the limbs in coordinated patterns", "a person stands at a high edge and looks down then leaps outward into open space", "a person holds a coloring tool near the face then applies strokes above the eyes", "a person holds flat material in both hands then bends and creases it into a new form", "a person positions a circular object around the body then rotates the torso to maintain motion", "a person grips a stick and positions near a ball then swings the stick to propel the ball forward", "a person positions on a smooth cold surface then pushes off and glides forward", "a person wears a fabric canopy and runs forward then leaps off elevation and floats through air", "a person holds striking tools above surfaces then hits them in alternating rhythmic sequence", "players sit around a surface and take turns then move objects according to rules", "a person raises a tube to the mouth then blows air into it to create sound", "people position behind an object then apply force to move it forward", "a person mounts onto an animal then the animal moves forward with the rider", "a person holds a cutting tool near an animal then removes covering material from its body", "a person lifts one leg and rotates the body then extends the leg outward to strike", "a person raises a limb from resting position then extends it away from the body", "a person positions the feet and lifts the heels then strikes the floor with the feet in rhythm", "a person grips a weighted object and rotates the body then releases it toward a target", "a person grips a sealed container then applies force to break the seal and access contents"]
  AUTOMATIC_MULTI_SCALE_TEST: false
  UPLOAD_CLASSIFIER_RESULTS: true

DATA:
  DATA_ROOT_DIR: ./k100/k100_output/  
  ANNO_DIR: ./configs/projects/CLIPFSAR/kinetics100/
  NUM_INPUT_FRAMES: 6
  SAMPLING_RATE: 35
  SAMPLING_UNIFORM: false
  TRAIN_JITTER_SCALES: [256, 256]
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  TRAIN_CROP_SIZE: 224 # 84  # 224
  TEST_CROP_SIZE: 224
  TEST_SCALE: 256
  CLIP_INTERVAL: 8
  TEST_CENTER_CROP: true
  FPS: 12
  TARGET_FPS: 12

LOG_PERIOD: 50

DATA_LOADER:
  NUM_WORKERS: 32
  PIN_MEMORY: true
  ENABLE_MULTI_THREAD_DECODE: true

SOLVER:
  BASE_LR: 0.00001
  LR_POLICY: steps_with_relative_lrs
  STEPS_ITER: 250 
  STEPS: [0, 6, 9]
  LRS: [1, 0.1, 0.01]
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 5e-4  
  WARMUP_EPOCHS: 1
  WARMUP_START_LR: 0.000005
  OPTIM_METHOD: adam
  DAMPENING: 0.0
  NESTEROV: true
# add bn, use same lr settings as server

VIDEO:
  HEAD:
    NAME: CNN_SEMANTIC_ALIGNMENT_FEW_SHOT
    BACKBONE_NAME: ViT-B/16
    ACTIVATION: softmax
    DROPOUT_RATE: 0.0
    NUM_CLASSES: 5

  BACKBONE:
    META_ARCH: Identity


NUM_GPUS: 4
OUTPUT_DIR: output3/CLIPFSAR_K100_SEMANTIC_ALIGNMENT_1shot


