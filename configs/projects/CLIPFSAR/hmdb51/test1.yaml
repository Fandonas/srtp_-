_BASE: ../OTAM_base.yaml
TASK_TYPE: few_shot_action
TRAIN:
  ENABLE: true
  USE_CLASSIFICATION: true
  USE_CLASSIFICATION_VALUE: 1.2
  DATASET_FEW: HMDB_few_shot
  DATASET: Ssv2_few_shot
  META_BATCH: true  # meta or not
  NUM_SAMPLES: 1000000
  WAY: 5
  SHOT: 1
  QUERY_PER_CLASS: 5 #5
  QUERY_PER_CLASS_TEST: 1
  NUM_TRAIN_TASKS: 7000
  NUM_TEST_TASKS: 10000
  VAL_FRE_ITER: 300 #300
  BATCH_SIZE: 1  # Same with NUM_GPUS
  CLASS_NAME: ["Running bristles through strands to smooth and untangle hair","Closing hands around a flying object to trap it mid-air","Crushing food between teeth to break it into swallowable pieces","Striking palms together to make a sharp percussive sound","Pulling body upward on a surface to gain height hand-over-hand","Lifting each foot to the next step to ascend the staircase","Plunging head-first into water to enter with minimal splash","Grasping the hilt and sliding the blade free from its scabbard","Bouncing a ball repeatedly off the floor while walking or running","Sipping liquid through the lips to quench thirst","Dropping bodily until hitting the ground with impact","Springing off hands to flip backward and land on feet","Balancing upside-down with body weight on straight arms","Wrapping arms around another person to express affection","Propelling body upward off the ground with both feet","Pressing lips against skin to show love or greeting","Hoisting chin above a bar by pulling arms downward","Thrusting fist forward fast to strike a target","Shoving an object away by extending arms with force","Pedaling wheels forward to travel balanced on two tires","Sitting astride the animal and guiding its stride with reins","Grasping each other's right hand in greeting or agreement","Releasing the drawn string to launch an arrow toward target","Curling torso upward from lying to strengthen abdominal muscles","Rising onto both feet to hold body upright on ground","Swinging the blade through air to cut or parry","Performing rehearsed swings and stances with the blade","Hurling an object through the air by swinging the arm","Rotating body around its axis to face a new direction","Stepping alternately forward to move across the ground","Flapping hand side-to-side to greet or say goodbye"]
  BATCH_SIZE_PER_TASK: 1 #改 本来：4
  CHECKPOINT_FILE_PATH: ""
  EVAL_PERIOD: 2
  NUM_FOLDS: 1
  TEXT_COFF: 0.7

AUGMENTATION:
  COLOR_AUG: false
  NO_RANDOM_ERASE: true

TEST:
  ENABLE: false
  DATASET: Ssv2_few_shot
  BATCH_SIZE: 1  # Same with NUM_GPUS
  TEST_SET: val
  CLASS_NAME: ['fencing', 'kick', 'kick ball', 'pick', 'pour', 'pushup', 'run', 'sit', 'smoke', 'talk']
  NUM_ENSEMBLE_VIEWS: 1
  SPATIAL_CROPS: cctltr
  AUTOMATIC_MULTI_SCALE_TEST: false
  UPLOAD_CLASSIFIER_RESULTS: true
  PROMPT: "a video of {}"  # 自定义 PROMPT 模板，{}会被类别名称替换

DATA:
#  DATA_ROOT_DIR: /mnt/workspace/hmdb51/
#  ANNO_DIR: ./configs/projects/CLIPFSAR/hmdb51/
  DATA_ROOT_DIR: /workdir1.8t/zhongcc/data/test1/hmdb51/
  ANNO_DIR: ./configs/projects/CLIPFSAR/hmdb51/ #改
  NUM_INPUT_FRAMES: 7 #8 改
  SAMPLING_RATE: 50
  # SAMPLING_RATE_TRAIN: 3
  SAMPLING_UNIFORM: false
  TRAIN_JITTER_SCALES: [256, 256]
  MEAN: [0.48145466, 0.4578275, 0.40821073]
  STD: [0.26862954, 0.26130258, 0.27577711]
  TRAIN_CROP_SIZE: 224 # 84  # 224
  TEST_CROP_SIZE: 224
  TEST_SCALE: 256
  TEST_CENTER_CROP: true
  CLIP_INTERVAL: 8
  FPS: 12
  TARGET_FPS: 12


LOG_PERIOD: 50
SOLVER:
  BASE_LR: 0.00001  # 0.0001 # 0.0005
  LR_POLICY: steps_with_relative_lrs
  STEPS_ITER: 700 #每个epoch多少的tier
  STEPS: [0, 4, 6]
  LRS: [1, 0.1, 0.01]
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 5e-5
  WARMUP_EPOCHS: 1
  WARMUP_START_LR: 0.000001
  OPTIM_METHOD: adam
  DAMPENING: 0.0
  NESTEROV: true
# add bn, use same lr settings as server

VIDEO:
  HEAD:
    NAME: CNN_OTAM_CLIPFSAR  
    BACKBONE_NAME: "RN50"
    
  BACKBONE:
    META_ARCH: Identity

#NUM_GPUS: 4
NUM_GPUS: 1 #改
OUTPUT_DIR: output/CLIPFSAR_HMDB51_1shot



